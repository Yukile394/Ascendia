name: Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - mc: "1.21"
            yarn: "1.21+build.9"
            loader: "0.16.10"
            fabric_api: "0.100.8+1.21"
          - mc: "1.21.1"
            yarn: "1.21.1+build.3"
            loader: "0.16.10"
            fabric_api: "0.107.0+1.21.1"
          - mc: "1.21.2"
            yarn: "1.21.2+build.1"
            loader: "0.16.10"
            fabric_api: "0.106.1+1.21.2"
          - mc: "1.21.3"
            yarn: "1.21.3+build.4"
            loader: "0.16.10"
            fabric_api: "0.107.0+1.21.3"
          - mc: "1.21.4"
            yarn: "1.21.4+build.8"
            loader: "0.16.10"
            fabric_api: "0.119.2+1.21.4"

    runs-on: ubuntu-latest
    name: Build ${{ matrix.mc }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set versions
        run: |
          sed -i "s/minecraft_version=.*/minecraft_version=${{ matrix.mc }}/" gradle.properties
          sed -i "s/yarn_mappings=.*/yarn_mappings=${{ matrix.yarn }}/" gradle.properties
          sed -i "s/loader_version=.*/loader_version=${{ matrix.loader }}/" gradle.properties
          sed -i "s/fabric_version=.*/fabric_version=${{ matrix.fabric_api }}/" gradle.properties

      - name: Build
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ascendia-${{ matrix.mc }}
          path: build/libs/*.jar
